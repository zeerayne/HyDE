# Configuration file for HyDE
# Environment variables should be on top
# Updated config.toml file can be found at $HOME/.local/share/hyde/config.toml

[rofi]
font = "JetBrainsMono Nerd Font"
scale = 10

[rofi.launch]
scale = 10

[rofi.cliphist]
scale = 10

[screenshot]
annotation_tool = "swappy"

[mediaplayer]
prefix_playing = " "
prefix_paused = " "
max_length = 25
standby_text = ""

[hyprland]
lockscreen = "hyprlock"
