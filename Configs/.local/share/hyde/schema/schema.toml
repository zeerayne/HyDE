[properties.hyprland-start]
    description = "Hyprland start configuration."
    type        = "object"

[properties.hyprland-start.properties.dbus_share_picker]
    default     = "dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP XDG_CONFIG_HOME QT_QPA_PLATFORMTHEME"
    description = "DBus share picker."
    type        = "string"

[properties.hyprland-start.properties.systemd_share_picker]
    default     = "systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP XDG_CONFIG_HOME QT_QPA_PLATFORMTHEME"
    description = "Systemd share picker."
    type        = "string"

[properties.hyprland-start.properties.xdg_portal_reset]
    default     = "hyde-shell resetxdgportal.sh"
    description = "XDG portal reset script."
    type        = "string"

[properties.hyprland-start.properties.auth_dialogue]
    default     = "hyde-shell app -t service -- polkitkdeauth.sh"
    description = "Authentication dialogue."
    type        = "string"

[properties.hyprland-start.properties.idle_daemon]
    default     = "hyde-shell app -u hyde-$XDG_SESSION_DESKTOP-idle.service -t service -- hypridle"
    description = "Idle daemon."
    type        = "string"

[properties.hyprland-start.properties.blue_light_filter_daemon]
    default     = "hyde-shell app -u hyde-$XDG_SESSION_DESKTOP-blue-light-filter.service -t service -- hyprsunset"
    description = "Blue-light filter daemon."
    type        = "string"

[properties.hyprland-start.properties.text_clipboard]
    default     = "hyde-shell app -u hyde-$XDG_SESSION_DESKTOP-text-clipboard.service -t service wl-paste --type text --watch cliphist store"
    description = "Text clipboard."
    type        = "string"

[properties.hyprland-start.properties.image_clipboard]
    default     = "hyde-shell app -u hyde-$XDG_SESSION_DESKTOP-image-clipboard.service -t service wl-paste --type image --watch cliphist store"
    description = "Image clipboard."
    type        = "string"

[properties.hyprland-start.properties.clipboard_persist]
    default     = "hyde-shell app -u hyde-$XDG_SESSION_DESKTOP-clipboard-persist.service -t service wl-clip-persist --clipboard regular"
    description = "Clipboard persist daemon."
    type        = "string"

[properties.hyprland-start.properties.wallpaper]
    default     = "hyde-shell app -u hyde-$XDG_SESSION_DESKTOP-wallpaper.service -t service -- wallpaper.sh --start --global"
    description = "Wallpaper script."
    type        = "string"

[properties.hyprland-start.properties.bar]
    default     = "hyde-shell app -u hyde-$XDG_SESSION_DESKTOP-bar.scope -t scope -- waybar.py --watch"
    description = "Bar."
    type        = "string"

[properties.hyprland-start.properties.notifications]
    default     = "hyde-shell app -u hyde-$XDG_SESSION_DESKTOP-notifications.service -t service -- dunst"
    description = "Notifications."
    type        = "string"

[properties.hyprland-start.properties.battery_notify]
