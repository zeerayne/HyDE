# Schema in toml file for config.toml
# This is intended to be edited manually by HyDE and generate a JSON schema
# for the configuration file: ~/.config/hyde/config.toml

# ? This file is a reference for:
# * wiki table
# * --json to generate the JSON schema
# * --config to generate a copy of config.toml

# Run commands to generate:
# ./gen-config.py > ./config.toml
# ./gen-table.py > config.md
# ./gen-json.py > ./config.toml.json


"$schema" = "http://json-schema.org/draft-07/schema#"
type      = "object"


[properties.wallpaper]
    description = "Wallpaper configuration."
    type        = "object"

[properties.wallpaper.properties.custom_paths]
    default     = [  ]
    description = "List of paths to search for wallpapers."
    type        = "array"

[properties.wallpaper.properties.custom_paths.items]
    type = "string"

[properties.wallpaper.properties.backend]
    default     = "awww"
    description = "Wallpaper backend, requires 'wallpaper.<backend>.sh' as handler script in $PATH"
    options     = [ "awww", "pcmanfm-qt", "mpvpaper", "hyprpaper", "waydeeper" ]
    type        = "string"

[properties.wallpaper.properties.awww]
    description = "wallpaper select configuration."
    type        = "object"

[properties.wallpaper.properties.awww.properties.framerate]
    default     = 60
    description = "Transition framerate."
    type        = "integer"

[properties.wallpaper.properties.awww.properties.duration]
    default     = 1
    description = "Transition duration."
    type        = "integer"

[properties.wallpaper.properties.awww.properties.transition_next]
    default     = "grow"
    description = "Transition type for next wallpaper."
    type        = "string"

[properties.wallpaper.properties.awww.properties.transition_prev]
    default     = "outer"
    description = "Transition type for previous wallpaper."
    type        = "string"

[properties.wallpaper.properties.awww.properties.transition_default]
    default     = "grow"
    description = "Transition type for default wallpaper."
    type        = "string"

[properties.wallpaper.properties.waydeeper]
    description = "waydeeper 3D parallax wallpaper configuration."
    type        = "object"

[properties.wallpaper.properties.waydeeper.properties.strength]
    default     = 0.02
    description = "Sets both X & Y parallax strength."
    type        = "number"

[properties.wallpaper.properties.waydeeper.properties.strength_x]
    default     = 0.02
    description = "X-axis parallax strength."
    type        = "number"

[properties.wallpaper.properties.waydeeper.properties.strength_y]
    default     = 0.02
    description = "Y-axis parallax strength."
    type        = "number"

[properties.wallpaper.properties.waydeeper.properties.smooth_animation]
    default     = true
    description = "Enables smooth easing for animation."
    type        = "boolean"

[properties.wallpaper.properties.waydeeper.properties.animation_speed]
    default     = 0.05
    description = "Animation speed multiplier."
    type        = "number"

[properties.wallpaper.properties.waydeeper.properties.fps]
    default     = 60
    description = "Frame rate (30 or 60)."
    options     = [ 30, 60 ]
    type        = "integer"

[properties.wallpaper.properties.waydeeper.properties.active_delay]
    default     = 150
    description = "Delay (ms) before animation starts after mouse enters wallpaper surface."
    type        = "integer"

[properties.wallpaper.properties.waydeeper.properties.idle_timeout]
    default     = 5000
    description = "Stops animation (ms) after mouse idle."
    type        = "integer"

[properties.wallpaper.properties.waydeeper.properties.invert_depth]
    default     = false
    description = "Inverts depth interpretation."
    type        = "boolean"

[properties.wallpaper.properties.waydeeper.properties.model]
    default     = "depth-anything-v3-base"
    description = "ONNX depth model: depth-anything-v3-base, midas-small, depth-pro-q4."
    options     = [ "depth-anything-v3-base", "midas-small", "depth-pro-q4" ]
    type        = "string"

[properties.wallpaper.properties.waydeeper.properties.regenerate]
    default     = false
    description = "Forces regeneration of depth maps & meshes."
    type        = "boolean"

[properties.rofi]
    description = "Global rofi configuration."
    type        = "object"

[properties.rofi.properties.scale]
    default     = 10
    description = "Rofi default scaling."
    type        = "integer"

[properties.rofi.properties.hyprlock]
    description = "'hyde-shell hyprlock select' configuration."
    type        = "object"

[properties.rofi.properties.hyprlock.properties.scale]
    default     = 10
    description = "Scaling for hyprlock."
    type        = "integer"

[properties.rofi.properties.animation]
    description = "'animation.sh select' configuration."
    type        = "object"

[properties.rofi.properties.animation.properties.scale]
    default     = 10
    description = "Scaling for animation."
    type        = "integer"

[properties.rofi.properties.glyph]
    description = "glyph-picker.sh configuration."
    type        = "object"

[properties.rofi.properties.glyph.properties.scale]
    default     = 10
    description = "Scaling for glyph picker."
    type        = "integer"

[properties.rofi.properties.glyph.properties.args]
    default     = [ "-multi-select" ]
    description = "Additional arguments for glyph picker."
    type        = "array"
[properties.rofi.properties.glyph.properties.args.items]
    type = "string"


[properties.rofi.properties.launch]
    description = "rofilaunch.sh configuration."
    type        = "object"

[properties.rofi.properties.launch.properties.scale]
    default     = 5
    description = "Scaling for launch."
    type        = "integer"

[properties.rofi.properties.launch.properties.drun_args]
    default     = [  ]
    description = "Additional arguments for drun mode."
    type        = "array"

[properties.rofi.properties.launch.properties.drun_args.items]
    type = "string"

[properties.rofi.properties.launch.properties.run_args]
    default     = [  ]
    description = "Additional arguments for run mode."
    type        = "array"

[properties.rofi.properties.launch.properties.run_args.items]
    type = "string"

[properties.rofi.properties.launch.properties.window_args]
    default     = [  ]
    description = "Additional arguments for window mode."
    type        = "array"

[properties.rofi.properties.launch.properties.window_args.items]
    type = "string"

[properties.rofi.properties.launch.properties.filebrowser_args]
    default     = [  ]
    description = "Additional arguments for filebrowser mode."
    type        = "array"

[properties.rofi.properties.launch.properties.filebrowser_args.items]
    type = "string"

[properties.rofi.properties.launch.properties.drun_style]
    default     = "style_1"
    description = "Style for drun mode."
    type        = "string"

[properties.rofi.properties.launch.properties.window_style]
    default     = "style_1"
    description = "Style for window mode."
    type        = "string"

[properties.rofi.properties.launch.properties.run_style]
    default     = "style_1"
    description = "Style for run mode."
    type        = "string"

[properties.rofi.properties.launch.properties.filebrowser_style]
    default     = "style_1"
    description = "Style for filebrowser mode."
    type        = "string"

[properties.rofi.properties.cliphist]
    description = "cliphist.sh configuration."
    type        = "object"

[properties.rofi.properties.cliphist.properties.scale]
    default     = 10
    description = "Scaling for cliphist."
    type        = "integer"

[properties.rofi.properties.wallpaper]
    description = "wallpaper select configuration."
    type        = "object"

[properties.rofi.properties.wallpaper.properties.scale]
    default     = 10
    description = "Scaling for wallpaper."
    type        = "integer"

[properties.rofi.properties.wallpaper.properties.column_count]
    default     = 3
    description = "Number of columns for wallpaper selector."
    type        = "integer"

[properties.rofi.properties.emoji]
    description = "emoji-picker.sh configuration."
    type        = "object"

[properties.rofi.properties.emoji.properties.style]
    default     = 1
    description = "Style for emoji picker."
    options     = [ 1, 2 ]
    type        = "integer"

[properties.rofi.properties.emoji.properties.scale]
    default     = 10
    description = "Scaling for emoji picker."
    type        = "integer"

[properties.rofi.properties.emoji.properties.args]
    default     = [ "-multi-select" ]
    description = "Additional arguments for emoji picker."
    type        = "array"
[properties.rofi.properties.emoji.properties.args.items]
    type = "string"


[properties.rofi.properties.theme]
    description = "themeselect.sh configuration."
    type        = "object"

[properties.rofi.properties.theme.properties.scale]
    default     = 6
    description = "Scaling for theme selector."
    type        = "integer"

[properties.rofi.properties.theme.properties.column_count]
    default     = 3
    description = "Number of columns for theme selector."
    type        = "integer"

[properties.rofi.properties.theme.properties.thumb_style]
    description = "Thumbnail style for theme selector."
    options     = [ "sqre", "quad", "blur" ]
    type        = "string"

[properties.rofi.properties.websearch]
    description = "hyde-shell rofi.websearch.sh configuration."
    type        = "object"

[properties.rofi.properties.websearch.properties.style]
    default     = ""
    description = "Style for rofi websearch."
    type        = "string"

[properties.rofi.properties.websearch.properties.args]
    default     = [  ]
    description = "Additional arguments for websearch."
    type        = "array"

[properties.rofi.properties.websearch.properties.args.items]
    type = "string"

[properties.rofi.properties.websearch.properties.scale]
    default     = 10
    description = "Scaling for websearch."
    type        = "integer"
[properties.rofi.properties.websearch.properties.font]
    default     = "JetBrainsMono Nerd Font"
    description = "Font for websearch."
    type        = "string"


[properties.rofi.properties.bookmarks]
    description = "hyde-shell rofi.bookmarks.sh configuration."
    type        = "object"

[properties.rofi.properties.bookmarks.properties.style]
    default     = ""
    description = "Style for rofi bookmarks."
    type        = "string"

[properties.rofi.properties.bookmarks.properties.args]
    default     = [  ]
    description = "Additional arguments for bookmarks."
    type        = "array"

[properties.rofi.properties.bookmarks.properties.args.items]
    type = "string"

[properties.rofi.properties.bookmarks.properties.scale]
    default     = 10
    description = "Scaling for bookmarks."
    type        = "integer"

[properties.rofi.properties.bookmarks.properties.font]
    default     = "JetBrainsMono Nerd Font"
    description = "Font for bookmarks."
    type        = "string"


[properties.wlogout]
    description = "wlogout configuration."
    type        = "object"

[properties.wlogout.properties.style]
    default     = 2
    description = "Style for wlogout."
    options     = [ 1, 2 ]
    type        = "integer"

[properties."battery.notify"]
    description = "batterynotify.sh configuration."
    type        = "object"

[properties."battery.notify".properties.timer]
    default     = 120
    description = "Timer for battery notifications."
    type        = "integer"

[properties."battery.notify".properties.notify]
    default     = 1140
    description = "Notification threshold."
    type        = "integer"

[properties."battery.notify".properties.interval]
    default     = 5
    description = "Interval for battery notifications."
    type        = "integer"

[properties."battery.notify".properties.dock]
    default     = true
    description = "Dock status for battery notifications."
    type        = "boolean"

[properties."battery.notify".properties.threshold]
    description = "Thresholds for battery notifications."
    type        = "object"

[properties."battery.notify".properties.threshold.properties.full]
    default     = 90
    description = "Full battery threshold."
    type        = "integer"

[properties."battery.notify".properties.threshold.properties.critical]
    default     = 10
    description = "Critical battery threshold."
    type        = "integer"

[properties."battery.notify".properties.threshold.properties.low]
    default     = 20
    description = "Low battery threshold."
    type        = "integer"

[properties."battery.notify".properties.threshold.properties.unplug]
    default     = 100
    description = "Unplug battery threshold."
    type        = "integer"

[properties."battery.notify".properties.execute]
    description = "Commands to execute for battery notifications."
    type        = "object"

[properties."battery.notify".properties.execute.properties.unplug]
    default     = ""
    description = "Command to execute when unplugged."
    type        = "string"

[properties."battery.notify".properties.execute.properties.low]
    default     = ""
    description = "Command to execute when battery is low."
    type        = "string"

[properties."battery.notify".properties.execute.properties.critical]
    default     = "systemctl suspend"
    description = "Command to execute when battery is critical."
    type        = "string"

[properties."battery.notify".properties.execute.properties.charging]
    default     = ""
    description = "Command to execute when charging."
    type        = "string"

[properties."battery.notify".properties.execute.properties.discharging]
    default     = ""
    description = "Command to execute when discharging."
    type        = "string"

[properties."keybind.hint"]
    description = "keybind.hint.py configuration."
    type        = "object"

[properties."rofi.keybind.hint"]
    description = "keybind_hint.sh configuration."
    type        = "object"

[properties."rofi.keybind.hint".properties.delimiter]
    default     = "\t"
    description = "Delimiter for keybind hints."
    type        = "string"

[properties."rofi.keybind.hint".properties.width]
    default     = "40em"
    description = "Width for keybind hints."
    type        = "string"

[properties."rofi.keybind.hint".properties.height]
    default     = "40em"
    description = "Height for keybind hints."
    type        = "string"

[properties."rofi.keybind.hint".properties.line]
    default     = 16
    description = "Number of lines for keybind hints."
    type        = "integer"

[properties.screenshot]
    description = "screenshot.sh configuration."
    type        = "object"

[properties.screenshot.properties.annotation_enabled]
    default     = true
    description = "Enable or disable annotation feature."
    type        = "boolean"

[properties.screenshot.properties.annotation_tool]
    default     = "satty"
    description = "Annotation tool for screenshots."
    options     = [ "satty", "swappy" ]
    type        = "string"

[properties.screenshot.properties.annotation_pre_command]
    default     = [  ]
    description = "Pre command for annotation tool."
    type        = "array"

[properties.screenshot.properties.annotation_pre_command.items]
    type = "string"

[properties.screenshot.properties.annotation_post_command]
    default     = [ "" ]
    description = "Post command for annotation tool."
    type        = "array"

[properties.screenshot.properties.annotation_post_command.items]
    type = "string"

[properties."screenshot.ocr"]
    description = "OCR configuration."
    type        = "object"

[properties."screenshot.ocr".properties.tesseract_languages]
    default     = [ "eng" ]
    description = "Place desired languages to use for text recognition. To see installed languages run `tesseract --list-langs`."
    type        = "array"

[properties."rofi.bookmark"]
    description = "Bookmark configuration."
    type        = "object"

[properties."rofi.bookmark".properties.file]
    description = "Path to the bookmark file."
    type        = "string"

[properties."rofi.search"]
    description = "Search configuration."
    type        = "object"

[properties."rofi.search".properties.file]
    description = "Path to the search file."
    type        = "string"

[properties.wallbash]
    description = "wallbash configuration."
    type        = "object"

[properties.wallbash.properties.skip_template]
    default     = [ "" ]
    description = "Templates to skip when using wallbash."
    options     = [ "waybar.dcol", "waybar.theme" ]
    type        = "array"

[properties.wallbash.properties.skip_template.items]
    type = "string"

[properties.waybar]
    description = "waybar configuration."
    type        = "object"

[properties.waybar.properties.font]
    default     = "JetBrainsMono Nerd Font"
    description = "Font for waybar."
    type        = "string"

[properties.waybar.properties.scale]
    default     = 10
    description = "Total scaling for waybar."
    type        = "integer"

[properties.waybar.properties.icon_size]
    default     = 10
    description = "Icon size for waybar."
    type        = "integer"

[properties.waybar.properties.position]
    default     = "top"
    description = "A fallback position of the waybar.  "
    options     = [ "top", "bottom", "left", "right" ]
    type        = "string"

[properties.weather]
    description = "Weather configuration."
    type        = "object"

[properties.weather.properties.temperature_unit]
    default     = "c"
    description = "Temperature unit ('c' or 'f')."
    type        = "string"

[properties.weather.properties.time_format]
    default     = "24h"
    description = "Time format ('12h' or '24h')."
    type        = "string"

[properties.weather.properties.windspeed_unit]
    default     = "km/h"
    description = "Windspeed unit ('km/h' or 'mph')."
    type        = "string"

[properties.weather.properties.show_icon]
    default     = true
    description = "Show the weather icon in waybar."
    type        = "boolean"

[properties.weather.properties.show_location]
    default     = true
    description = "Show the location in waybar."
    type        = "boolean"

[properties.weather.properties.show_today]
    default     = true
    description = "Show detailed description of today in tooltip."
    type        = "boolean"

[properties.weather.properties.forecast_days]
    default     = 3
    description = "Number of days to show forecast (0-3)."
    type        = "integer"

[properties.weather.properties.location]
    default     = ""
    description = "Location/coordinates string for the weather output."
    type        = "string"

[properties."cava.stdout"]
    description = "'cava.sh stdout' configuration."
