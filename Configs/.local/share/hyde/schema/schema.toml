    description = "Standby character for cava."
    type        = "string"

[properties."cava.stdout".properties.bar_array]
    default     = [ "░", "▒", "▓", "█" ]
    description = "Bar array for stdout preset."
    type        = "array"

[properties."cava.stdout".properties.bar_array.items]
    type = "string"

[properties."cava.hyprlock"]
    description = "'cava.sh hyprlock' configuration."
    type        = "object"

[properties."cava.hyprlock".properties.bar]
    default     = "▁▂▃▄▅▆▇█"
    description = "Bar characters for cava."
    type        = "string"

[properties."cava.hyprlock".properties.width]
    default     = 20
    description = "Width of the cava output."
    type        = "integer"

[properties."cava.hyprlock".properties.range]
    default     = 7
    description = "Number of bars minus one."
    type        = "integer"

[properties."cava.hyprlock".properties.standby]
    default     = "🎶"
    description = "Standby character for cava."
    type        = "string"

[properties."cava.hyprlock".properties.bar_array]
    default     = [ "▁", "▂", "▃", "▄", "▅", "▆", "▇", "█" ]
    description = "Bar array for hyprlock preset."
    type        = "array"

[properties."cava.hyprlock".properties.bar_array.items]
    type = "string"

[properties."cava.waybar"]
    description = "'cava.sh waybar' configuration."
    type        = "object"

[properties."cava.waybar".properties.bar]
    default     = "▁▂▃▄▅▆▇█"
    description = "Bar characters for cava."
    type        = "string"

[properties."cava.waybar".properties.width]
    default     = 20
    description = "Width of the cava output."
    type        = "integer"

[properties."cava.waybar".properties.range]
    default     = 7
    description = "Number of bars minus one."
    type        = "integer"

[properties."cava.waybar".properties.standby]
    default     = "🎶"
    description = "Standby character for cava."
    type        = "string"

[properties."cava.waybar".properties.bar_array]
    default     = [ "◜", "◝", "◞", "◟", "◠", "◡", "◢", "◣" ]
    description = "Bar array for waybar preset."
    type        = "array"

[properties."cava.waybar".properties.bar_array.items]
    type = "string"

[properties."cava"]
    description = "Cava visualizer configuration."
    type        = "object"

[properties.cava.properties.channels]
    default     = "stereo"
    description = "Audio channels: stereo or mono."
    options     = [ "stereo", "mono" ]
    type        = "string"

[properties.cava.properties.reverse]
    default     = 1
    description = "Reverse spectrum movement (0 or 1)."
